    Productfeaturetypevalues:
      enum:
        - Bankingservice
        - Administrationservice
        - Accessservice
        - Pricefeature
      type: string
      description: ">\r

        * `Bankingservice` - A classification that distinguishes between
        instances of product features according to the core banking services,
        functionality and/or objectives of banking.


        e.g. deposit services, exchange services, etc.


        The primary reason for the contract with the client are the banking
        services. These services can be classified as follows:

        1. Selling services

        2. Financial Instruments Exchange

        3. Financial Stock Management

        4. Financial Transfers

        5. Financial Risk Transfer

        6. Business Operating

        7. Advisory

        8. Reporting


        \r

        * `Administrationservice` - A classification that distinguishes between
        instances of product features according to administrative tasks related
        to the Banking Product or Service.\r

        * `Accessservice` - A classification that distinguishes between product
        features according to way of the banking services can be accessed.


        The access to services becomes more and more important in the evolving
        markets.\ 

        We need to separate different parts:

        1. The physical access to the infrastructure that allows access to the
        bank (where)

        2. The authorization of different parties to use the services of the
        bank (who)

        3. The agreed procedure to have access to different services (how)

        4. The services that are available for the different parties (what)

        \r

        * `Pricefeature` - A classification that distinguishes between instances
        of product features according to the cost/profit that is related to
        Banking Products or Services.


        In all commercial offerings, there is an agreed cost for both parties
        (e.g. the interest arrangements are in both directions). The pricing
        structure of products or packages is a service that gives the
        possibility to the client to adapt his costs to his individual
        situation.

        We see different generic categories in the pricing structure of the
        different products.

        1. Compensations

        2. Prices

        3. Fees

        4. Discounts\r\n"
