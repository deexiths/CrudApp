        - Salarypayment
        - Socialsecuritybenefit
        - Standingorder
        - Subscription
        - Treasurystatepayment
        - Unemploymentdisabilitybenefit
        - Valueaddedtaxpayment
        - Taxpayment
        - Overnightdeposit
        - Marginallending
        - Other
        - Upfront
        - Unwind
        - Principalexchange
      type: string
      description: ">\r

        * `Cashtransaction` - Transaction is a withdrawal/deposit of cash.\r

        * `Domesticpayment` - Payment has an origin and a destination in the
        same country, and is made in the currency of that country.\r

        * `Domestichighvaluepayment` - Transaction is a high value payment that
        has an origin and a destination in the same country and is made in the
        currency of that country.\r

        * `Domesticprioritypayment` - Transaction is a priority payment that has
        an origin and a destination in the same country and is made in the
        currency of that country.\r

        * `Crossborderpayment` - Payment has an origin in one country, a
        destination in another, and is made in the currency of either the origin
        or destination country.\r

        * `Crossborderprioritypayment` - Transaction is a priority payment that
        has an origin in one country and a destination in another and is made in
        the currency of either the origin or destination country.\r

        * `Crossborderhighvaluepayment` - Transaction is a high value payment
        that has an origin in one country and a destination in another country
        and is made in the currency of either the origin or destination
        country.\r

        * `Thirdcurrencypayment` - Transaction is a payment that is made in a
        third currency to the origin and destination countries. The origin and
        destination countries may be one and the same country.\r

        * `Thirdcurrencyhighvaluepayment` - Transaction is a high value payment
        that is made in a third currency to the origin and destination
        countries. The origin and destination countries may be one and the same
        country.\r

        * `Thirdcurrencyprioritypayment` - Payment is made in a third currency
        to the origin and destination countries. The origin and destination
        countries may be the same country.\r

        * `Tradesettlementpayment` - Transaction is the settlement of a trade,
        eg, a securities transaction.\r

        * `Foreignexchange` - Transaction isthe settlement of a foreign exchange
        deal.\r

        * `Equivalentamount` - Transaction is an equivalent amount relative to a
        currency conversion.\r

        * `Loan` - Transaction is the payment of a specific amount of money lent
        by a creditor/lender.\r

        * `Loanrepayment` - Transaction is an amount of money transferred in
        repayment of loan.\r

        * `Securities` - Transaction is a payment of securities.\r

        * `Lockbox` - Transaction is a payment(s) resulting from a lock box
        service.\r

        * `Dividend` - Transaction is a payment of dividends.\r

        * `Crossedcheque` - Transaction is a crossed cheque. A crossed check has
        two parallel lines across its face, indicating that the cheque must be
        paid into an account and not cashed over the counter.\r

        * `Opencheque` - Transaction is an uncrossed cheque that can be cashed
        at the bank of origin.\r

        * `Ordercheque` - Transaction is a cheque made payable to a named
        recipient 'or order' enabling the creditor to either deposit it in an
        account or endorse it to a third party, ie, transfer the rights to the
        cheque by signing it on the reverse.\r

        * `Circularcheque` - Transaction is an instruction from a bank to its
        correspondent bank to pay the creditor a stated sum of money on
        presentation of a means of identification.\r

        * `Travellerscheques` - Transaction is a payment resulting from
        travellers cheques.\r

        * `Bankdraft` - Transaction is a cheque drawn by a bank on itself or its
        agent. A person who owes money to another buys the draft from a bank for
        cash and hands it to the creditor who need have no fear that it might be
        dishonoured.\r

        * `Documentarycredit` - Transaction is a documentary credit from one
        banker to another, authorising the payment of a specified sum of money
        to the person named in the document, based on specified conditions.\r

        * `Billofexchange` - Transaction is a written order from a drawer to a
        drawee to pay a specified sum of money upon demand, or on a specified
        date, to the drawer or to a third party specified by the drawer. A bill
        of exchange is also called a draft.\r

        * `Collection` - Transaction is a collection. A collection is the act of
        sending a cheque, bill of exchange or another financial instrument to
        the prospective financial institution for payment.\r

        * `Cashmanagementtransfer` - Transaction is a general cash management
        instruction.\r

        * `Topaccount` - Transaction is a cash management instruction,
        requesting to top the account of the debtor above a certain floor
        amount. The floor amount, if not pre-agreed by the parties involved, may
        be specified.\r

        * `Zerobalanceaccount` - Transaction is a cash management instruction,
        requesting to zero balance the account of the debtor.\r

        * `Standingfacilities` - Payment is linked to overnight deposits and the
        marginal lending facility.\r

        * `Standardservicelevelcredit` - Transaction is a credit transfer to be
        processed according to the Standard Service Level.\r

        * `Liquiditytransfer` - Payment is made to transfer liquidity to/from
        the settlement account of a member, to/from the current account held at
        the central institution or any other institution.\r

        * `Advancepayment` - Transaction is a payment made in advance or as an
        advance.\r

        * `Valuedateadjustment` - Transaction reverses a previously incorrectly
        value dated entry.\r

        * `Dvpgross` - Gross cash payment offsetting the amount owed/due for a
        securities transaction settlement.\r

        * `Dvpnet` - Net payment offsetting the cash balance due/owed for a
        series of securities transactions settlement.\r

        * `Netting` - Transaction is a netting operation.\r

        * `Limitpayment` - Transaction is a payment that is processed when the
        pool of liquidity exceeds the minimum value reserved for an express
        payment in the RTGSPlus system.\r

        * `Backup` - Payment is made under the recovery procedure to move
        liquidity to/from the settlement account of a member according to the
        specifications of the system.\r

        * `Expresspayment` - Transaction is a payment that is processed whenever
        liquidity is available on the settlement account of a member of the
        RTGSPlus system.\r

        * `Centralbankoperation` - Payment is made to settle an operation made
        with the central bank.\r

        * `Clspayment` - Payment is linked to CLS activities.\r

        * `Eurodomesticpayment` - Transaction is a credit transfer in Euro with
        its country of origin and country of destination within the European
        Union. The origin and destination countries may be one and the same
        country.\r

        * `Agriculturaltransfer` - Transaction is related to the agricultural
        domain.\r

        * `Alimonypayment` - Transaction is a payment(s) made by one spouse to
        the other after a separation or divorce. An alimony payment may be
        applied to other family relationships.\r

        * `Balanceretail` - Transaction is a payment offsetting the net cash
        balance owed/due in a retail payment system.\r

        * `Bonuspayment.` - Net cash payment offsetting the balance due/owed in
        a retail payment system.\r

        * `Brokeragefee` - Transaction is charges levied by a broker.\r

        * `Capitalbuilding` - Transaction is payment into a personal pension
        scheme for retirement.\r

        * `Charitypayment` - Transaction is a payment for charity reasons.\r

        * `Childbenefit` - Transaction is a payment made to a parent/guardian to
        help maintain a child.\r

        * `Commercialcredit` - Transaction is settlement of a commercial
        credit.\r

        * `Commission` - Transaction is payment of a fee for executing a
        transaction.\r

        * `Commoditytransfer` - Transaction is a payment of products traded on a
        commodity exchange.\r

        * `Costs` - Transaction is apayment of costs.\r

        * `Copyright` - Transaction is a payment of copyright.\r

        * `Governmentpayment` - Transaction is apayment to or from a government
        department.\r

        * `Instalmenthirepurchaseagreement` - Transaction is a payment of an
        instalment or to the settlement of a hire-purchase agreement.\r

        * `Insurancepremium` - Transaction is a payment of an insurance
        premium.\r

        * `Intracompanypayment` - Transaction is an intra-company payment, ie, a
        payment between two companies belonging to the same group.\r

        * `Interest` - Transaction is a payment of interest.\r

        * `Licensefee` - Transaction is a payment of a license fee.\r

        * `Metals` - Transaction is a purchase or sale of metals.\r

        * `Pensionpayment` - Transaction is a payment of a pension allowance.\r

        * `Purchasesaleofgoods` - Transaction is a payment for the purchase and
        sale of goods.\r

        * `Refund` - Transaction is a repayment of funds.\r

        * `Rent` - Transaction is a payment of rent.\r

        * `Royalties` - Transaction is a payment of royalties.\r

        * `Purchasesaleofservices` - Transaction is a payment for the purchase
        and sale of services.\r

        * `Salarypayment` - Transaction is a payment of salaries.\r

        * `Socialsecuritybenefit` - Transaction is a social security benefit, a
        payment made by a government to support individuals.\r

        * `Standingorder` - Transaction is a standing order. A standing order is
        an instruction given by a party having explicit authority on the account
        to debit, ie, either debit account owner or originating party, to a
        first agent to process cash transfers at specified intervals during an
        implicit or explicit period of time. It is given once, and is valid for
        an open or closed period of time.\r

        * `Subscription` - Transaction is a payment of a subscription.\r

        * `Treasurystatepayment` - Payment is linked to the Treasury State.\r

        * `Unemploymentdisabilitybenefit` - Transaction is a payment made to an
        unemployed/disabled person.\r

        * `Valueaddedtaxpayment` - Transaction is apayment of value added tax.\r

        * `Taxpayment` - Transaction is a payment of taxes.\r

        * `Overnightdeposit` - Transaction is linked to an overnight deposit.\r

        * `Marginallending` - Transaction is linked to the marginal lending
        facility.\r

        * `Other` - Specifies that a proprietary code must be indicated.\r

        * `Upfront` - Transaction is an initial payment made by one of the
        counterparties  either to bring a transaction to fair value or for any
        other reason that may be the cause of an off-market transaction.\r

        * `Unwind` - Transaction is the final settlement payment made when a
        transaction is unwound prior to its end date or a payment that may
        result due to the full termination of derivative transaction(s).\r

        * `Principalexchange` - Transaction is an exchange of notional values
        for cross-currency swaps.\r\n"
    Paymenttimevalues:
      enum:
        - Paymentondelivery
        - Endofmonthofdelivery
        - Endofperiodafterdelivery
        - Endofperiodafterendofdeliverymonth
        - Paymentonreceiptofinvoice
        - Endofperiodafterendofreceiptmonth
        - Endofperiodafterreceipt
        - Endofmonthofreceipt
        - Endofperiodaftermatch
        - Endofperiodaftershipmentdate
        - Endofperiodafterpurchaseorderdate
        - Endofperiodafterbaselineestablishment
        - Endofperiodafterinvoicedate
      type: string
      description: ">\r

        * `Paymentondelivery` - Code for payment on delivery.\r

        * `Endofmonthofdelivery` - Code for payment at end of month of
        delivery.\r

        * `Endofperiodafterdelivery` - Code for payment at end of period after
        delivery.\r

        * `Endofperiodafterendofdeliverymonth` - Code for payment at end of
        period after end of month of delivery.\r

        * `Paymentonreceiptofinvoice` - Code for payment on receipt of
        invoice.\r

        * `Endofperiodafterendofreceiptmonth` - Code for payment at end of
        period after end of month of receipt of invoice.\r

        * `Endofperiodafterreceipt` - Code for payment at end of period after
        receipt of invoice.\r

        * `Endofmonthofreceipt` - Code for payment at end of month of receipt of
        invoice.\r

        * `Endofperiodaftermatch` - Code for payment at end of period after
        match or mismatch acceptance.\r

        * `Endofperiodaftershipmentdate` - Payment at end of period after
        shipment date.\r

        * `Endofperiodafterpurchaseorderdate` - Payment at end of period after
        purchase order date.\r

        * `Endofperiodafterbaselineestablishment` - Payment at end of period
        after baseline establishment date.\r

        * `Endofperiodafterinvoicedate` - Payment at end of period after invoice
        date.\r\n"
    Remittancedeliverymethodtypevalues:
      enum:
        - Fax
        - Electronicdatainterchange
        - Uniformresourceidentifier
        - Email
        - Post
        - SMS
      type: string
      description: ">\r

        * `Fax` - Remittance advice information must be faxed.\r

        * `Electronicdatainterchange` - Remittance advice information must be
        sent through Electronic Data Interchange (EDI).\r

        * `Uniformresourceidentifier` - Remittance advice information needs to
        be sent to a Uniform Resource Identifier (URI). URI is a compact string
        of characters that uniquely identify an abstract or physical resource.
        URI's are the super-set of identifiers, such as URLs, email addresses,
        ftp sites, etc, and as such, provide the syntax for all of the
        identification schemes.\r

        * `Email` - Remittance advice information must be sent through e-mail.\r

        * `Post` - Remittance advice information must be sent through postal
        services.\r

        * `SMS` - Remittance advice information must be sent through by phone as
        a short message service (SMS).\r\n"
    Contactpointtypevalues:
      enum:
        - ElectronicAddress
        - PostalAddress
        - PhoneNumber
        - Socialnetworkaddress
      type: string
      description: ">\r

        * `ElectronicAddress` - Address which is accessed by electronic means.
        ISO20022\r

        * `PostalAddress` - Information that locates and identifies a specific
        address. ISO20022\r

        * `PhoneNumber` - Collection of information that identifies a phone
        address. ISO20022\r

        * `Socialnetworkaddress` - A social network such as Facebook, Twitter,
        etc.\r\n"
    Partylocationtypevalues:
      enum:
