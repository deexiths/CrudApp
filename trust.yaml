    Organisationidentificationtypevalues:
      enum:
        - LEI
        - ELF
        - MIC
        - BICFI
        - Bankpartyidentification
        - Centralbankidentificationnumber
        - Clearingidentificationnumber
        - Certificateofincorporationnumber
        - Countryidentificationcode
        - Customernumber
        - Datauniversalnumberingsystem
        - Employeridentificationnumber
        - Gs1glnidentifier
        - SIREN
        - SIRET
        - Taxidentificationnumber
        - EANGLN
      type: string
      description: ">\r

        * `LEI` - Legal Entity Identifier is a code allocated to a party as
        described in ISO 17442 \"Financial Services - Legal Entity Identifier
        (LEI)\".\r

        * `ELF` - Entity Legal Forms is a code allocated to a party as described
        in ISO 20275 \"Financial services  Entity legal forms (ELF)\". \r

        * `MIC` - Market Identifier Code. Identification of a financial market,
        as stipulated in the norm ISO 10383 \"Codes for exchanges and market
        identifications\".\r

        * `BICFI` - Code allocated to a financial institution by the ISO 9362
        Registration Authority as described in ISO 9362 \"Banking - Banking
        telecommunication messages - Business identifier code (BIC)\".\r

        * `Bankpartyidentification` - Unique and unambiguous assignment made by
        a specific bank or similar financial institution to identify a
        relationship as defined between the bank and its client.\r

        * `Centralbankidentificationnumber` - A unique identification number
        assigned by a central bank to identify an organisation.\r

        * `Clearingidentificationnumber` - A unique identification number
        assigned by a clearing house to identify an organisation\r

        * `Certificateofincorporationnumber` - A unique identification number
        assigned by a designated authority to a certificate of incorporation and
        used to identify an organisation.\r

        * `Countryidentificationcode` - Country authority given organisation
        identification (e.g., corporate registration number)\r

        * `Customernumber` - Number assigned by an issuer to identify a
        customer.

        Number assigned by a party to identify a creditor or debtor
        relationship.\r

        * `Datauniversalnumberingsystem` - A unique identification number
        provided by Dun & Bradstreet to identify an organisation.\r

        * `Employeridentificationnumber` - Number assigned by a registration
        authority to an employer.\r

        * `Gs1glnidentifier` - Global Location Number. A non-significant
        reference number used to identify legal entities, functional entities,
        or physical entities according to GS1 numbering scheme rules.The number
        is used to retrieve detailed information that is linked to it.\r

        * `SIREN` - The SIREN number is a 9 digit code assigned by INSEE, the
        French National Institute for Statistics and Economic Studies, to
        identify an organisation in France.\r

        * `SIRET` - The SIRET number is a 14 digit code assigned by INSEE, the
        French National Institute for Statistics and Economic Studies, to
        identify an organisation unit in France. It consists of the SIREN
        number, followed by a five digit classification number, to identify the
        local geographical unit of that entity\r

        * `Taxidentificationnumber` - Number assigned by a tax authority to
        identify an organisation.\r

        * `EANGLN` - Global Location Number. A non-significant reference number
        used to identify legal entities, functional entities, or physical
        entities according to the European Association for Numbering (EAN)
        numbering scheme rules. The number is used to retrieve detailed
        information that is linked to it. (iso20022)\r\n"
    Organisationidentification:
      type: object
      properties:
        OrganisationIdentificationType:
