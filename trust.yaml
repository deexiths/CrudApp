        employed in controlling, directing, or managing an activity,
        organization, or system.\ 


        The set of rules and legislation governing certain actions.\ 

        https://financial-dictionary.thefreedictionary.com/Regulatory\r

        * `Law` - A binding rule that the courts will enforce.

        A system of rules and guidelines which are enforced through social
        institutions to govern behavior. (FIBO)

        \r

        * `Guideline` - A recommended practice (adapted from Business
        Dictionary)

        A general rule, principle, or piece of advice.\r

        * `Criterion` - A principle or standard by which something may be judged
        or decided.


        Read more: http://www.businessdictionary.com/definition/criterion.html\r

        * `Standard` - A rule considered by an authority or by general consent
        as a basis of comparison\r\n"
