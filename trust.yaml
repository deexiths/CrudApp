    Featuretypevalues:
      enum:
        - FeeFeature
        - InterestFeature
        - WithdrawalFeature
        - DepositFeature
        - SweepFeature
        - LienFeature
        - PaymentFeature
        - RepaymentFeature
        - LimitFeature
        - OverdraftFeature
        - StatementFeature
        - CurrencyExchangeFeature
        - PriceFeature
      type: string
      description: ">\r

        * `FeeFeature` - This refers to the functionality in a system or
        platform that manages, calculates, or displays fees associated with
        specific transactions or services.\r

        * `InterestFeature` - This feature calculates and tracks interest
        earnings or charges on accounts, loans, or investments over time.\r

        * `WithdrawalFeature` - The withdraw feature typically refers to an
        option or functionality that allows users to retrieve or remove
        something from a system or platform.\r

        * `DepositFeature` - This refers to a functionality that allows users to
        add funds to an account or system, often by transferring money from
        another source.\r

        * `SweepFeature` - \r

        * `LienFeature` - \r

        * `PaymentFeature` - This refers to the functionality that facilitates
        or tracks the transfer of funds for a purchase or settlement of dues.\r

        * `RepaymentFeature` - This feature facilitates or manages the process
        of paying back borrowed funds, such as loans, credit card balances, or
        advances.\r

        * `LimitFeature` - This feature sets, monitors, or enforces restrictions
        on the maximum amount that can be accessed, spent, or transacted within
        a system.\r

        * `OverdraftFeature` - This functionality allows users to withdraw more
        money than what is available in their account balance, often up to a
        predefined limit.\r

        * `StatementFeature` - The statement feature refers to a functionality
        in banking, finance, or digital platforms that provides users with a
        detailed record of their transactions or activities over a specific
        period.\r

        * `CurrencyExchangeFeature` - This feature enables users to convert
        funds from one currency to another at prevailing exchange rates, often
        within financial or payment platforms.\r

        * `PriceFeature` - This feature involves displaying or managing the
        price of goods, services, or financial instruments within a
        platform.\r\n"
