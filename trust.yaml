    Limittypevalues:
      enum:
        - Multilateral
        - Bilateral
        - Netbilateral
        - Indirectbilateral
        - Global
        - Mandatorybilateral
        - Discretionarybilateral
        - Directdebit
        - Singlecustomerdirectdebit
        - Singlefinancialinstitutiondirectdebit
        - Totaldailycustomerdirectdebit
        - Totaldailyfinancialinstitutiondirectdebit
        - Autocollateralisation
        - Unsecuredcredit
        - Externalguarantee
      type: string
      description: ">\r

        * `Multilateral` - Limit is a maximum amount value applied to, or by, a
        participant to a set of counterparties. The multilateral limit is taken
        into account by the transaction administrator to contain the risk in the
        system. With the help of the multilateral limit, the direct participant
        restricts the use of liquidity when clearing payments with all other
        direct participants for which no bilateral limit is set.\r

        * `Bilateral` - Limit is applied by one party to a specific
        counterparty, and corresponds to the maximum amount of traffic party
        setting the limit can send to that counterparty. The limit can be
        expressed as a debit or a credit limit. With the help of a bilateral
        limit, the direct participant restricts the use of liquidity when
        clearing payments with another direct participant.\r

        * `Netbilateral` - Limit is applied by one party to a specific
        counterparty, and corresponds to the maximum net balance acceptable by
        the party that is setting the limit. The limit is calculated as an
        arithmetic sum in value of the bilateral flows exchanged between the two
        parties. The net bilateral limit can be expressed as a debit or a credit
        balance.\r

        * `Indirectbilateral` - Limit is a maximum value set by a direct
        participant with respect to its indirect participant. The limit
        represents the maximum amount the indirect participant can use to settle
        its operations.\r

        * `Global` - Maximum value set by either the transaction administrator
        or by a member for the participation of a member in the system. The
        global limit may be expressed as a credit or debit maximum value and is
        taken into account by the transaction administrator when processing
        transaction inside the system. With the help of the global limit, the
        direct participant may limit the use of liquidity when clearing specific
        type of payments.\r

        * `Mandatorybilateral` - Mandatory part of the bilateral limit applied
        by one party to a specific counterparty, and corresponds to the maximum
        amount of traffic party setting the limit can send to that counterparty.
        The limit can be expressed as a debit or a credit limit. With the help
        of a bilateral limit, the direct participant restricts the use of
        liquidity when clearing payments with another direct participant.\r

        * `Discretionarybilateral` - Discretionary part of the bilateral limit
        applied by one party to a specific counterparty, and corresponds to the
        maximum amount of traffic party setting the limit can send to that
        counterparty. The limit can be expressed as a debit or a credit limit.
        With the help of a bilateral limit, the direct participant restricts the
        use of liquidity when clearing payments with another direct
        participant.\r

        * `Directdebit` - Limit not to be exceeded for direct debit
        operations.\r

        * `Singlecustomerdirectdebit` - Single direct debit payment limit not to
        be exceeded by any single direct debit transaction by a customer.\r

        * `Singlefinancialinstitutiondirectdebit` - Single direct debit payment
        limit not to be exceeded by any single direct debit transaction
        initiated by a financial institution.\r

        * `Totaldailycustomerdirectdebit` - Total daily payments limit for
        customer direct debits not to be exceeded by the total of all direct
        debit transactions initiated by customers.\r

        * `Totaldailyfinancialinstitutiondirectdebit` - Total daily payments
        limit for financial institutions direct debits not to be exceeded by the
        total of all direct debit transactions initiated by financial
        institutions.\r

        * `Autocollateralisation` - Limit is related to a credit operation that
        is or can be triggered when a buyer does not have a sufficient amount of
        money to settle a securities transaction in order to improve its cash
        position for the next settlement cycle. The credit provided can be
        secured using securities already held by the buyer (“collateral stocks”)
        or the securities that are being purchased (“collateral flows”).\r

        * `Unsecuredcredit` - Limit is related to a cap amount granted by a
        national central bank or a settlement bank, but generally unsecured
        outside of the market infrastructure.\r

        * `Externalguarantee` - Limit is related to a cap amount granted by a
        national central bank or a settlement bank.\r\n"
    Limitstatustypevalues:
      enum:
        - Enabled
        - Disabled
        - Deleted
        - Requested
      type: string
      description: ">\r

        * `Enabled` - Limit is currently in effect.\r

        * `Disabled` - Limit is not currently in effect.\r

        * `Deleted` - Limit has been deleted or suspended.\r

        * `Requested` - Limit has been asked for and is not yet enabled.\r\n"
