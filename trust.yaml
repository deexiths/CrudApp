components:
  schemas:
    HTTPError:
      type: object
      properties:
        status_code:
          type: string
          format: string
        status:
          type: string
          format: string
        message:
          type: string
          format: string
      description: Status Attributes
    Involvedparty:
      type: object
      properties:
        PartyReference:
          type: string
          description: Reference to a Party who plays a specific role
          format: Text
        InvolvementReference:
          type: string
          description: Reference to a specific Role that is played by a Party
          format: Text
      description: >-
        Reference to an entity that assigns and manages the identification.

        tReference to the organization or agency that issued the identifier
        (e.g., DMV, Passport Office).
    Datetimetypevalues:
      enum:
        - MaturityDate
        - InitiatedDate
        - RequestedDate
        - ExecutedDate
        - OpenDate
        - CloseDate
        - ExpiryDate
        - EffectiveDate
        - CreatingDate
        - ActivationDate
        - DeactivationDate
        - BlockingDate
        - SendingDate
        - ValidFromDate
        - ValidToDate
        - ReceivingDate
        - SigningDate
        - DueDate
        - ValueDate
        - FulfillmentDate
        - EntryDate
      type: string
      description: ">\r

        * `MaturityDate` - \r

        * `InitiatedDate` - \r

        * `RequestedDate` - \r

        * `ExecutedDate` - \r

        * `OpenDate` - \r

        * `CloseDate` - \r

        * `ExpiryDate` - \r

        * `EffectiveDate` - \r

        * `CreatingDate` - \r

        * `ActivationDate` - \r

        * `DeactivationDate` - \r

        * `BlockingDate` - \r

        * `SendingDate` - \r

        * `ValidFromDate` - \r

        * `ValidToDate` - \r

        * `ReceivingDate` - \r

        * `SigningDate` - \r

        * `DueDate` - \r

        * `ValueDate` - \r

        * `FulfillmentDate` - \r

        * `EntryDate` - \r\n"
    Datetime:
      type: object
      properties:
        DateTimeContent:
          type: string
          description: The particular date and time point in the progression of time
          format: Text
        TimeZoneCode:
          type: string
          description: The time zone to which the date time refers.
          format: Text
        DaylightSavingIndicator:
          type: string
          description: ""
          format: Text
        DateTimeType:
          $ref: "#/components/schemas/Datetimetypevalues"
      description: The date when the identifier became valid.
    Identifier:
      type: object
      properties:
        IdentifierValue:
          type: string
          description: tThe actual unique code or number (e.g., passport number, drivers
            license number).
          format: Value
        IdentifierIssuerReference:
          $ref: "#/components/schemas/Involvedparty"
        IdentifierStartDate:
          $ref: "#/components/schemas/Datetime"
        IdentifierEndDate:
          $ref: "#/components/schemas/Datetime"
      description: The identifier of Condition
    Name:
      type: object
      properties:
        Name:
          type: string
          description: A name is a word or phrase that constitutes the distinctive
            designation of a person, place, thing or concept. (UN/CEFAT)
          format: DataType
      description: The name of Condition
    Datetimeperiod:
      type: object
      properties:
        FromDateTime:
          $ref: "#/components/schemas/Datetime"
        ToDateTime:
          $ref: "#/components/schemas/Datetime"
      description: The validity period of Condition
    Conditionstatustypevalues:
      enum:
        - Defined
        - Pending
        - Activated
        - Evaluated
        - Fulfilled
        - Violated
        - Expired
        - Archived
      type: string
      description: ">\r

        * `Defined` - Condition is authored or configured\r

        * `Pending` - Awaiting approval or validation\r

        * `Activated` - Live and ready for evaluation\r

        * `Evaluated` - Assessed in context of process or event\r

        * `Fulfilled` - Condition criteria met\r

        * `Violated` - Condition criteria not met\r

        * `Expired` - No longer valid due to time/version limits\r

        * `Archived` - Retired from use, retained for audit/history\r\n"
    Termandconditiontypevalues:
      enum:
        - CommissionTermAndCondition
        - LegalTermAndCondition
        - RegulatoryTermAndCondition
        - PolicyTermAndCondition
        - RestrictionTermAndCondition
        - PreferenceTermAndCondition
        - InvestmentTermAndCondition
        - MandateTermAndCondition
        - OperationalTermAndCondition
        - ProductTermAndCondition
        - AgreementTermAndCondition
        - RelationshipTermAndCondition
        - ConfidentialTermAndCondition
      type: string
      description: ">\r

