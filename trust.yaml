    Arrangementtypevalues:
      enum:
        - SweepArrangement
        - WithdrawalArrangement
        - DepositArrangement
        - InterestArrangement
        - FeeArrangement
        - LienArrangement
        - InformationArrangement
        - PaymentArrangement
        - EntitlementArrangement
        - PeriodArrangement
        - CollateralArrangement
        - LimitArrangement
        - AccessArrangement
        - CardPaymentArrangement
        - StandingOrderArrangement
        - OverdraftArrangement
        - RepaymentArrangement
        - StatementArrangement
        - CreditTransferArrangement
        - ProductAndServiceArrangement
        - FactoringArrangement
        - RolloverArrangement
        - RestructuringArrangement
        - InsuranceArrangement
        - CollectionArrangement
        - UnderwritingArrangement
        - TerminationArrangement
        - MaturityArrangement
        - AdministrativeArrangement
      type: string
      description: ">\r

        * `SweepArrangement` - An arrangement into which is promised for the
        set-up and execution of structured sweeps to and from the facility to a
        linked account.\r

        * `WithdrawalArrangement` - An arrangement into which is promised to
        deliver Withdraw Service  to take fund out of an account. \r

        * `DepositArrangement` - An arrangement into which is promised to
        deliver Deposit Service  to place funds into an account for safekeeping.
        \r

        * `InterestArrangement` - An arrangement into which is promised to apply
        a pricing element expressed in a percentage  to a principal amount.\r

        * `FeeArrangement` - An arrangement into which is promised to apply a
        charge for services rendered. \r

        * `LienArrangement` - An arrangement into which is promised for placing
        a lien or block on the account for a specified purpose, amount, and
        period. \r

        * `InformationArrangement` - An arrangement concerning the information
        the bank will provide about the agreement/account\r

        * `PaymentArrangement` - An arrangement into which is promised to
        deliver a specific payment service including regular payments, standing
        orders, direct debits and bill pay instructions. \r

        * `EntitlementArrangement` - Right or obligation linked to the
        involvement of a party in an agreement\r

        * `PeriodArrangement` - \r

        * `CollateralArrangement` - An arrangement into which is promised for
        handling the oversight of the allocation, valuation and administration
        of collateral associated with the facility. \r

        * `LimitArrangement` - An arrangement to limit something

        e.g., the number of transaction per week, the amount of money allowed to
        withdraw per week/day and etc. \r

        * `AccessArrangement` - An arrangement that allows or restricts the
        access to a service or product, channel or device through a specific
        access point\r

        * `CardPaymentArrangement` - An arrangement into which is promised to
        deliver Card payment Service to execute payment transactions through a
        payment card, including online payments. \r

        * `StandingOrderArrangement` - An arrangement into which is promised to
        deliver Standing Order Service to make regular transfers on given dates
        to a named beneﬁciary. \r

        * `OverdraftArrangement` - An arrangement into which is promised to
        deliver Overdraft Service  that allows fund transfer even if there is no
        provision on the account. \r

        * `RepaymentArrangement` - An arrangement into which is promised for
        paying back money previously borrowed from a lender. \r

        * `StatementArrangement` - An arrangement into which is promised to
        deliver a reporting service on payment transactions registered on an
        account. \r

        * `CreditTransferArrangement` - An arrangement into which is promised to
        allow a payer to transfer fund to a beneficiary. \r

        * `ProductAndServiceArrangement` - \r

        * `FactoringArrangement` - \r

        * `RolloverArrangement` - Arrangement stipulating the modalities for an
        automatic renewal of the agreement


        i.e. the replacement of the agreement with a new one without renewed
        negociation and witout explicit agreement of the customer \r

        * `RestructuringArrangement` - \r

        * `InsuranceArrangement` - \r

        * `CollectionArrangement` - An arrangement into which is promised to
        collect past-due debts from borrowers\r

        * `UnderwritingArrangement` - A contractual agreement between parties
        that commits the underwriter to assuming risk.\r

        * `TerminationArrangement` - \r

        * `MaturityArrangement` - \r

        * `AdministrativeArrangement` - \r\n"
