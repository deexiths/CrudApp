        affairs of a company are directed or location in which a person resides
        (the place of a person's home). ISO20022\r

        * `LocationIsDomicileAddressOfParty` - Location in which a person is
        permanently domiciled (the place of a person's permanent home).
        ISO20022\r

        * `LocationIsPlaceOfBirthOfParty` - \r

        * `LocationIsWorkAddressOfParty` - \r

        * `LocationIsDeliveryPointAddressOfParty` - \r

        * `PartyIsOwnerOfLocation` - Registered owner or title holder(s) of the
