    Frequencytypevalues:
      enum:
        - Annual
        - Monthly
        - Quarterly
        - Semiannual
        - Weekly
        - Daily
        - Adhoc
        - Intraday
        - Overnight
        - Tendays
        - Fortnightly
        - Triggeredbymovement
        - Never
        - Rate
        - Oncreditevent
        - Upfront
        - Onexpiry
        - Hourly
      type: string
      description: ">\r

        * `Annual` - Event takes place every year or once a year.\r

        * `Monthly` - Event takes place every month or once a month.\r

        * `Quarterly` - Event takes place every three months or four times a
        year.\r

        * `Semiannual` - Event takes place every six months or two times a
        year.\r

        * `Weekly` - Event takes place once a week.\r

        * `Daily` - Event takes place every day.\r

        * `Adhoc` - Event takes place on request or as necessary.\r

        * `Intraday` - Event takes place several times a day.\r

        * `Overnight` - Event takes place overnight.\r

        * `Tendays` - Event takes place every ten business days.\r

        * `Fortnightly` - Event takes place every two weeks.\r

        * `Triggeredbymovement` - Event takes place at the end of the day if
        there was a movement on the account, otherwise nothing is sent that
        day.\r

        * `Never` - Event does never take place.\r

        * `Rate` - Event takes place based on a change of a rate.\r

        * `Oncreditevent` - Event occurs due to a credit event occurring for an
        issuer.\r

        * `Upfront` - Event that takes place at the initiation of a trade or
        agreement.\r

        * `Onexpiry` - Event occurs on expiry of a financial contract.\r

        * `Hourly` - Event takes place every hours.\r\n"
