        paid.\r

        * `CoverageArrangement` - Risks/events insured against and the
        scope/limits of protection.\r

        * `ExclusionArrangement` - Situations where the insurer will not pay.\r

        * `ClaimArrangement` - How claims are submitted, documents needed, and
        payout procedures.\r

        * `TerminationArrangement` - Conditions for ending the policy.\r

        * `RenewalArrangement` - Rules for extending or continuing the policy.\r

        * `BenefitArrangement` - How and to whom benefits are paid.\r

        * `Legal&RegulatoryArrangement` - Compliance with laws and dispute
        resolution mechanisms.\r

        * `PaymentArrangement` - Specifies how and when benefits are paid e.g.,
        lump sum, scheduled installments, or direct payment to service
        providers.\r

        * `ServiceArrangement` - Covers non-monetary benefits such as the
        provision of funeral services, transport of remains, or repatriation,
        usually via contracted service providers.\r\n"
