    Balancetypevalues:
      enum:
        - OpeningBalance
        - ClosingBalance
        - CurrentBalance
        - AvailableBalance
        - LedgerBalance
        - ReserveBalance
        - FreeBalance
        - PrincipalBalance
        - ClosingAvailable
        - ClosingBooked
        - ForwardAvailable
        - Information
        - InterimAvailable
        - InterimBooked
        - OpeningAvailable
        - OpeningBooked
        - PreviouslyClosedBooked
        - Expected
      type: string
      description: ">\r

        * `OpeningBalance` - Book balance of the account at the beginning of the
        account servicer's business day. It always equals the closing book
        balance from the previous business day. Note: the available balance at
        the beginning of the account servicer's business day may be different
        from the closing book balance from the previous business day.
        (ISO20022)\r

        * `ClosingBalance` - Balance of the account at the end of the account
        servicer's business day. It is the sum of the opening balance at the
        beginning of the day and all entries booked to the account during the
        account servicer's business day. (ISO20022)\r

        * `CurrentBalance` - Balance of the account at a precise moment in time.
        (ISO20022)\r

        * `AvailableBalance` - Balance of money or securities that is at the
        disposal of the account owner on the date specified. (ISO20022)\r

        * `LedgerBalance` - Ledger balance refers to posted transactions (e.g.
        limit authorisation amount - posted transactions). (ISO20022)\r

        * `ReserveBalance` - \r

        * `FreeBalance` - \r

        * `PrincipalBalance` - \r

        * `ClosingAvailable` - Closing balance of amount of money that is at the
        disposal of the account owner on the date specified.\r

        * `ClosingBooked` - Balance of the account at the end of the pre-agreed
        account reporting period. It is the sum of the opening booked balance at
        the beginning of the period and all entries booked to the account during
        the pre-agreed account reporting period.\r

        * `ForwardAvailable` - Forward available balance of money that is at the
        disposal of the account owner on the date specified.\r

        * `Information` - Balance for informational purposes.\r

        * `InterimAvailable` - Available balance calculated in the course of the
        account servicer's business day, at the time specified, and subject to
        further changes during the business day. The interim balance is
        calculated on the basis of booked credit and debit items during the
        calculation time/period specified.\r

        * `InterimBooked` - Balance calculated in the course of the account
        servicer's business day, at the time specified, and subject to further
        changes during the business day. The interim balance is calculated on
        the basis of booked credit and debit items during the calculation
        time/period specified.\r

        * `OpeningAvailable` - Opening balance of amount of money that is at the
        disposal of the account owner on the date specified.\r

        * `OpeningBooked` - Book balance of the account at the beginning of the
        account reporting period. It always equals the closing book balance from
        the previous report.\r

        * `PreviouslyClosedBooked` - Balance of the account at the previously
        closed account reporting period. The opening booked balance for the new
        period has to be equal to this balance.

        Usage: the previously booked closing balance should equal (inclusive
        date) the booked closing balance of the date it references and equal the
        actual booked opening balance of the current date.\r

        * `Expected` - Balance, composed of booked entries and pending items
        known at the time of calculation, which projects the end of day balance
        if everything is booked on the account and no other entry is
        posted.\r\n"
    Debitcreditindicatortvalues:
      enum:
        - Debit
        - Credit
      type: string
      description: ">\r

        * `Debit` - Transaction is a debt entry\r

        * `Credit` - Transaction is a credit entry\r\n"
    Balancecounterpartytypevalues:
      enum:
        - Bilateral
        - Multilateral
      type: string
      description: ">\r

        * `Bilateral` - Balance calculated regarding one member in the system.
        (ISO20022)\r

        * `Multilateral` - Balance calculated regarding all members in the
        system. (ISO20022)\r\n"
    Balancesubtypevalues:
      enum:
        - Adjustment
        - Basecurrency
        - Blocked
        - Blockedfunds
        - Daylightoverdraft
        - Eligibleassets
        - Firmcollateralization
        - Amountsthathavebeenusedtoserveasfirmcollateral
        - Securitiesforecast
        - Netfunding
        - Intermediate
        - Localcurrency
        - Limitrelated
        - Reservedliquidity
        - Securitiespending
        - Payinpayout
        - Progressiveaverage
        - Reserve
        - Selfcollateralization
        - Amountsthathavebeenusedtoserveasselfcollateral
        - Threshold
      type: string
      description: ">\r

        * `Adjustment` - Balance to be held in the settlement account in order
        to comply with the average reserve due, in the event that the bank's
        balance is equal to the reserve due during the remaining days of the
        maintenance period.\r

        * `Basecurrency` - Balance representing the amount in the domestic or
        base accounting currency.\r

        * `Blocked` - Balance representing the regulatory reserve that a
        financial institution must have with the account servicing institution,
        eg, the minimum credit balance a financial institution is to keep with
        its Central Bank for mandatory reserve purposes. In some countries, a
        blocked balance is known as a 'reserve' balance.\r

        * `Blockedfunds` - Balance representing funds that cannot be touched by
        the account owner.\r

        * `Daylightoverdraft` - Balance representing the intra day overdraft
        granted by the Central Bank to financial institutions participating in a
        RTGS system. This balance may vary over time and shall be offset at the
        end of the day.\r

        * `Eligibleassets` - Balance representing the potential loan a Central
        Bank would make in cash if the collateral is pledged, eg, securities
        available and eligible as collateral with the Central Bank.\r

        * `Firmcollateralization` - Balance representing the forecast of the
        cash-equivalent resulting from evaluation of existing holdings at CSD
        that are qualified to serve as collateral.\r

        * `Amountsthathavebeenusedtoserveasfirmcollateral` - Balance
        representing the cash equivalent resulting from evaluation of existing
        holdings at CSD that are qualified to serve as collateral and have been
        used as collateral.\r

        * `Securitiesforecast` - Balance representing the total of all balance
        types representing the forecast of transactions to settle, blocked
        items, custody transactions and corporate actions cash disbursements.\r

        * `Netfunding` - Balance representing the net amount to be
        funded resulting from the difference between the total of all
        transactions with a cash impact and the existing cash coverage.\r

        * `Intermediate` - Balance representing an intermediate amount such as
        the opening or closing balance incrementally carried forward from one
        page to the next in a multi-page statement or report.\r

        * `Localcurrency` - Balance representing the amount in the local market
        currency for which the asset is held.\r

        * `Limitrelated` - Balance of a specific limit value, eg, a bilateral
        balance is calculated in relation to a given bilateral limit.\r

        * `Reservedliquidity` - Balance representing the amount that a financial
        institution has set aside for a specific reason and which is therefore
        not available. In the context of CSDs, reservation of liquidity made to
        meet settlement obligations.\r

        * `Securitiespending` - Balance of securities pending delivery, such as
        orders to sell securities have been executed but settlement of the open
        transactions has not been confirmed.\r

        * `Payinpayout` - Balance representing the fictive amount of automated
        direct debits or payment based on standing arrangements between the CSD
        and the user. Usage: Pay-Ins and Pay-Outs can be different based on
        individual payment instructions or available funds.\r

        * `Progressiveaverage` - Average of the daily balances on the account
        used to fulfil the reserve requirements calculated from the beginning of
        the maintenance period.\r

        * `Reserve` - Balance representing the regulatory reserve that a
        financial institution must have with the account servicing institution,
        eg, the minimum credit balance a financial institution is to keep with
        its Central Bank for mandatory reserve purposes.\r

        * `Selfcollateralization` - Balance representing the forecast of the
        cash-equivalent resulting from evaluation of the net incoming balance of
        securities qualified to serve as collateral for which settlement
        instructions are held at.\r

        * `Amountsthathavebeenusedtoserveasselfcollateral` - Balance
        representing the cash-equivalent resulting from evaluation of incoming
        securities, qualified to serve as collateral and actually used as
        collateral, which have been settled during the settlement process.\r

        * `Threshold` - Balance representing the amount that will be destined
        for investment. Difference between available balance and threshold for
        investment limit.\r\n"
