    Paymentservicetypevalues:
      enum:
        - CreditTransferService
        - StandingOrderService
        - DirectDebitService
        - CardPaymentService
        - WithdrawService
        - DepositService
        - OverdraftService
        - MoneyRemittanceService
        - StatementService
      type: string
      description: ">\r

        * `CreditTransferService` - A payment service allowing a payer to
        transfer fund to a beneficiary. (a proposed definition for BIAN BOM
        adapted from ECB)\r

        * `StandingOrderService` - A credit transfer service to make regular
        transfers on given dates to a named beneﬁciary. (a proposed definition
        for BIAN BOM adapted from ISO20022)\r

        * `DirectDebitService` - A payment service for debiting a payer's
        payment account, where a payment transaction is initiated by the payee
        on the basis of the payer's consent given to the payee, to the payee's
        payment service provider or to the payer's own payment service provider.
        (a proposed definition for BIAN BOM adapted from PSD)\r

        * `CardPaymentService` - A payment service to execute payment
        transactions through a payment card, including online payments. (a
        proposed definition for BIAN BOM adapted from PSD)\r

        * `WithdrawService` - A payment service to take fund out of an account.
        (a proposed definition for BIAN BOM)\r

        * `DepositService` - A payment service to place funds into an account
        for safekeeping. (a proposed definition for BIAN BOM)\r

        * `OverdraftService` - A payment service that allows fund transfer even
        if there is no provision on the account. (a proposed definition for BIAN
        BOM)\r

        * `MoneyRemittanceService` - A payment service where funds are received
        from a payer, without any payment accounts being created in the name of
        the payer or the payee, for the sole purpose of transferring a
        corresponding amount to a payee or to another payment service provider
        acting on behalf of the payee, and/or where such funds are received on
        behalf of and made available to the payee. (a proposed definition for
        BIAN BOM adapted from PSD)\r

        * `StatementService` - A reporting service on payment transactions
        registered on an account. (a proposed definition for BIAN BOM)\r\n"
    Paymentdatetimetypevalues:
      enum:
        - RequestedExecutionDate
        - AcceptanceDate
        - CreationDate
        - ValueDate
        - DueDate
        - ExpiryDate
        - ExpectedDate
        - PoolingAdjustmentDate
      type: string
      description: ">\r

        * `RequestedExecutionDate` - Date at which the initiating party requests
        the clearing agent to process the payment. ISO20022

        Usage: This is the date on which the debtor's account is to be debited.
        If payment by cheque, the date when the cheque must be generated by the
        bank. \r

        * `AcceptanceDate` - Date and time at which all processing conditions
        for execution of the payment are met and adequate financial cover is
        available at the account servicing agent. ISO20022\r

        * `CreationDate` - Date and time at which the payment execution was
        created by the instructing agent. ISO20022\r

        * `ValueDate` - Date on which a payment must be executed (ISO20022)\r

        * `DueDate` - Due date for the payment. (ISO20022)

        \   \ 

        Latest date whereby the amount of money must be paid. (ISO20022)\r

        * `ExpiryDate` - \r

        * `ExpectedDate` - Expected date whereby the amount must be paid.\r

        * `PoolingAdjustmentDate` - Date used for the correction of the value
        date of a cash pool movement that has been posted with a different value
        date. (ISO20022)\r\n"
