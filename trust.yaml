        * `LocationIsContactPointAddressOfParty` - \r\n"
    Partytypevalues:
      enum:
        - Person
        - Organisation
      type: string
      description: ">\r

        * `Person` - Human entity, as distinguished from a corporate entity
        (which is sometimes referred to as an 'artificial person'). ISO20022\r

        * `Organisation` - Organised structure that is set up for a particular
        purpose. For example, a business, government body, department, charity,
        or financial institution. ISO20022\r\n"
    Partyidentificationtypevalues:
      enum:
        - Taxidentificationnumber
        - Nationalregistrationnumber
        - Registrationauthorityidentification
        - LEI(LegalEntityIdentifier)
        - Alienregistrationnumber
        - Passportnumber
        - Taxexemptidentificationnumber
        - Corporateidentification
        - Driverlicensenumber
        - Foreigninvestmentidentitynumber
        - Socialsecuritynumber
        - Identitycardnumber
        - Concat
        - Nationalregistrationidentificationnumber
      type: string
      description: ">\r

        * `Taxidentificationnumber` - Number assigned by a tax authority to an
        entity.\r

        * `Nationalregistrationnumber` - Number assigned by a national
        registration authority to an entity. In Singapore this is known as the
        NRIC. (ISO20022)\r

        * `Registrationauthorityidentification` - An identifier for the Legal
        Entity in a business registry in the jurisdiction of legal registration,
        or in the appropriate registration authority. (ISO20022)\r

        * `LEI(LegalEntityIdentifier)` - \r

        * `Alienregistrationnumber` - Number assigned by a government agency to
        identify foreign nationals.\r

        * `Passportnumber` - Number assigned by a passport authority.\r

        * `Taxexemptidentificationnumber` - Number assigned to a tax exempt
        entity.\r

        * `Corporateidentification` - Number assigned to a corporate entity.\r

        * `Driverlicensenumber` - Number assigned to a driver's license.\r

        * `Foreigninvestmentidentitynumber` - Number assigned to a foreign
        investor (other than the alien number).\r

        * `Socialsecuritynumber` - Number assigned by a social security
        agency.\r

        * `Identitycardnumber` - Number assigned by a national authority to an
        identity card.\r

        * `Concat` - Number assigned by an issuer to identify a customer via the
        concatenation of the birthdate and characters of the first name and
        surname.\r

        * `Nationalregistrationidentificationnumber` - National registration
        identification number. In Singapore this is known as the NRIC.\r\n"
