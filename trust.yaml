    Paymentamountandcurrencytypevalues:
      enum:
        - InstructedAmountAndCurrency
        - EquivalentAmountAndCurrency
        - DebtorAccountAmountAndCurrency
        - InterbankSettlementAmountAndCurrency
        - CreditorAccountAmountAndCurrency
        - Net/ReceivedAmountAndCurrency
      type: string
      description: ">\r

        * `InstructedAmountAndCurrency` - The amount the debtor asks their bank
        to transfer (e.g., “Send 100 EUR”).\r

        * `EquivalentAmountAndCurrency` - If the debtor’s account is in a
        different currency, this is the converted equivalent (e.g., 100 USD = 91
        EUR).\r

        * `DebtorAccountAmountAndCurrency` - The actual amount debited from the
        debtor’s account (after currency conversion, possibly including
        charges).\r

        * `InterbankSettlementAmountAndCurrency` - The amount exchanged/settled
        between the banks (may be in a different settlement currency, e.g.,
        USD).\r

        * `CreditorAccountAmountAndCurrency` - The amount credited to the
        creditor’s account in their account currency (e.g., GBP).\r

        * `Net/ReceivedAmountAndCurrency` - The final amount the creditor
        actually receives after any deductions (e.g., fees).\r\n"
    Paymentamountandcurrency:
      type: object
      properties:
        PaymentAmountAndCurrencyType:
          $ref: "#/components/schemas/Paymentamountandcurrencytypevalues"
        PaymentAmountAndCurrency:
          $ref: "#/components/schemas/Amount"
      description: Amount of the payment (arranged to be paid)
    Paymentmethodtypevalues:
      enum:
        - Cheque
        - Credittransfer
        - Directdebit
        - Transferadvice
        - Direct
        - Classical
      type: string
      description: ">\r

        * `Cheque` - Written order to a bank to pay a certain amount of money
        from one person to another person.\r

        * `Credittransfer` - Transfer of an amount of money in the books of the
        account servicer.\r

        * `Directdebit` - Collection of an amount of money from the debtor's
        bank account by the creditor. The amount of money and dates of
        collections may vary.\r

        * `Transferadvice` - Transfer of an amount of money in the books of the
        account servicer. An advice should be sent back to the account owner.\r

        * `Direct` - Direct method.\r

        * `Classical` - Classical method.\r\n"
    Paymenttypevalues:
      enum:
        - Cashtransaction
        - Domesticpayment
